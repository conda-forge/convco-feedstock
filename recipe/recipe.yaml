context:
  version: "0.7.0"

package:
  name: convco
  version: ${{ version }}

source:
  url: https://github.com/convco/convco/archive/refs/tags/v${{ version }}.tar.gz
  sha256: 3a9b33e41561f80eaa9252673a1ee1b4857743e2ff7b33079d0b616c772fa981

build:
  number: 0

requirements:
  build:
    - ${{ compiler('rust') }}
    - ${{ compiler('c') }}
    - ${{ compiler('cxx') }}
    - ${{ stdlib('c') }}
    - cargo-bundle-licenses
    - cmake
    - make

tests:
  - script:
      - convco --help

about:
  license: MIT
  license_file:
    - LICENSE
    - THIRDPARTY.yml
  summary: Conventional commits, changelog, versioning, validation
  homepage: https://github.com/convco/convco
  repository: https://github.com/convco/convco

extra:
  recipe-maintainers:
    - danielnachun
