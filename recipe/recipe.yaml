context:
  version: "0.6.4"

package:
  name: convco
  version: ${{ version }}

source:
  url: https://github.com/convco/convco/archive/refs/tags/v${{ version }}.tar.gz
  sha256: 907a7db94f0f49c2ee547c0aebfff50500a9d886a7e575bc0288d6937101972b

build:
  number: 0

requirements:
  build:
    - ${{ compiler('rust') }}
    - ${{ compiler('c') }}
    - ${{ compiler('cxx') }}
    - ${{ stdlib('c') }}
    - cargo-bundle-licenses
    - cmake
    - make

tests:
  - script:
      - convco --help

about:
  license: MIT
  license_file:
    - LICENSE
    - THIRDPARTY.yml
  summary: Conventional commits, changelog, versioning, validation
  homepage: https://github.com/convco/convco
  repository: https://github.com/convco/convco

extra:
  recipe-maintainers:
    - danielnachun
